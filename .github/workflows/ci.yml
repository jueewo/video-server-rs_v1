name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  SQLX_OFFLINE: true          # use cached query metadata; no live DB needed in CI

jobs:
  # ── Build and test ──────────────────────────────────────────────────────────
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry + build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Build
        run: cargo build --all

      - name: Run tests (unit + integration)
        run: cargo test --all

  # ── Artifact guard — reject forbidden files in PRs ─────────────────────────
  artifact-check:
    name: Artifact Guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fail if runtime artifacts are tracked
        run: |
          # Check for files that should never be committed
          FORBIDDEN=$(git ls-files \
            '*.db' '*.db-shm' '*.db-wal' \
            '*.log' '*.bak' \
            'node_modules/**' \
            'target/**' \
          ) || true

          if [ -n "$FORBIDDEN" ]; then
            echo "❌ Forbidden artifacts found in repository:"
            echo "$FORBIDDEN"
            exit 1
          fi
          echo "✅ No forbidden artifacts found"

  # ── Dependency audit ───────────────────────────────────────────────────────
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo audit
        run: cargo audit
