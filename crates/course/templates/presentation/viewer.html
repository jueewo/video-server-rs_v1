<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ title }}</title>
    <link rel="icon" type="image/webp" href="/static/icon.webp" />
    <link rel="stylesheet" href="/static/vendor/reveal/dist/reveal.css">
    <link rel="stylesheet" href="/static/vendor/reveal/dist/theme/{{ theme }}.css" id="reveal-theme">
    <link rel="stylesheet" href="/static/vendor/reveal/plugin/highlight/monokai.css">
    <style>
        html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
        .reveal .slides { text-align: left; }
        /* Legal overlay — unobtrusive, always visible */
        #legal-overlay {
            position: fixed;
            bottom: 4px;
            right: 8px;
            font-size: 10px;
            opacity: 0.4;
            z-index: 9999;
            color: #fff;
            mix-blend-mode: difference;
        }
        #legal-overlay a { color: inherit; text-decoration: none; margin-left: 6px; }
        #legal-overlay a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="reveal">
        <div class="slides">
            <section data-markdown
                     data-separator="\r?\n[ \t]*---[ \t]*\r?\n"
                     data-separator-vertical="\r?\n[ \t]*--[ \t]*\r?\n"
                     data-separator-notes="^Notes?:">
                <textarea data-template>{{ raw_slides|e }}</textarea>
            </section>
        </div>
    </div>

    <!-- Legal overlay: Impressum / Datenschutz -->
    <div id="legal-overlay">
        <a href="/impressum" target="_blank" rel="noopener">Impressum</a>
        <a href="/privacy" target="_blank" rel="noopener">Datenschutz</a>
    </div>

    <!-- Mermaid diagram sources extracted server-side; JSON-encoded to survive HTML parsing -->
    <script type="application/json" id="mermaid-data">{{ mermaid_diagrams_json|safe }}</script>
    <script src="/static/vendor/mermaid.min.js"></script>
    <script>
        if (typeof mermaid !== 'undefined') {
            mermaid.initialize({ startOnLoad: false, theme: 'neutral', securityLevel: 'loose' });
        }
    </script>
    <script type="module">
        import Reveal from '/static/vendor/reveal/dist/reveal.mjs';
        import RevealMarkdown from '/static/vendor/reveal/plugin/markdown/markdown.mjs';
        import RevealHighlight from '/static/vendor/reveal/plugin/highlight/highlight.mjs';
        import RevealNotes from '/static/vendor/reveal/plugin/notes/notes.mjs';

        const WORKSPACE_ID = '{{ workspace_id }}';
        const FOLDER_PATH  = '{{ folder_path }}';
        const CODE         = '{{ code }}';

        // Mermaid sources are JSON-encoded server-side; slides use ```mermaid-ref\n{idx}\n```
        const mermaidDiagrams = JSON.parse(
            document.getElementById('mermaid-data').textContent
        );

        const deck = new Reveal({
            plugins: [RevealMarkdown, RevealHighlight, RevealNotes],
            hash: true,
            transition: '{{ transition }}',
            progress: {{ show_progress }},
            slideNumber: '{{ show_slide_number }}',
            loop: {{ loop_ }},
            autoSlide: {{ auto_slide }},
        });
        await deck.initialize();

        // Rewrite relative image paths → workspace file serve URLs
        const BASE = `/api/workspaces/${WORKSPACE_ID}/files/serve`;
        document.querySelectorAll('.slides img').forEach(img => {
            const src = img.getAttribute('src');
            if (src && !src.startsWith('http') && !src.startsWith('/') && !src.startsWith('data:')) {
                img.src = `${BASE}?path=${encodeURIComponent(FOLDER_PATH + '/' + src)}&code=${encodeURIComponent(CODE)}`;
            }
        });

        // Replace mermaid-ref code blocks with rendered diagrams.
        // Use mermaid.render() with the source string directly (same approach as the mermaid editor)
        // to avoid ambiguity in how mermaid.run() reads innerHTML vs textContent from the DOM.
        if (typeof mermaid !== 'undefined' && mermaidDiagrams.length) {
            const replacements = [];
            document.querySelectorAll('code[class*="mermaid-ref"]').forEach(code => {
                const idx = parseInt(code.textContent.trim(), 10);
                const source = mermaidDiagrams[idx];
                if (source == null) return;
                const placeholder = code.closest('pre') ?? code;
                replacements.push({ placeholder, source, idx });
            });
            for (const { placeholder, source, idx } of replacements) {
                try {
                    const { svg } = await mermaid.render(`mermaid-diagram-${idx}`, source);
                    const div = document.createElement('div');
                    div.innerHTML = svg;
                    placeholder.replaceWith(div);
                } catch (err) {
                    console.error('Mermaid render error for diagram', idx, ':', err);
                }
            }
        }
    </script>
</body>
</html>
