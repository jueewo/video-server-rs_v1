<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Required</title>
    <link href="/static/vendor/daisyui.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/static/vendor/lucide.min.js"></script>
</head>
<body class="min-h-screen bg-base-200 flex items-center justify-center">
<div class="card bg-base-100 shadow-xl w-full max-w-sm">
    <div class="card-body items-center text-center">
        {% if let Some(thumb) = &thumbnail_url %}
        <img src="{{ thumb }}" class="w-24 h-24 object-cover rounded-xl shadow mb-2" alt="App thumbnail" />
        {% else %}
        <i data-lucide="lock" class="w-16 h-16 mb-2 mx-auto text-base-content/40"></i>
        {% endif %}
        <h2 class="card-title">Access Required</h2>
        <p class="text-base-content/60 mb-4">This app is protected. Enter the access code to continue.</p>
        <form method="get" action="/pub/{{ app_id }}" class="w-full flex flex-col gap-3">
            <input
                type="text"
                name="code"
                placeholder="Access code"
                class="input input-bordered w-full"
                autofocus
                autocomplete="off"
            />
            <button type="submit" class="btn btn-primary w-full">Open App</button>
        </form>
    </div>
</div>
<script>lucide.createIcons();</script>
</body>
</html>
