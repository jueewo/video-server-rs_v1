{% extends "base-tailwind.html" %}
{% block title %}{{ file_name }} — draw.io{% endblock %}
{% block content %}
<div class="container mx-auto px-4 py-12 max-w-lg text-center">

    <div class="card bg-base-100 border border-base-300 shadow-sm">
        <div class="card-body items-center gap-4 py-10">

            <span class="inline-flex items-center justify-center w-14 h-14 rounded-2xl"
                  style="background: linear-gradient(135deg, #667eea, #764ba2); box-shadow: 0 4px 16px rgba(102,126,234,0.35);">
                <i data-lucide="workflow" class="w-7 h-7 text-white"></i>
            </span>

            <div>
                <h1 class="text-lg font-semibold">{{ file_name }}</h1>
                <p class="text-sm text-base-content/50 mt-0.5">draw.io diagram</p>
            </div>

            <div id="status-idle" class="flex flex-col items-center gap-3 w-full">
                <p class="text-sm text-base-content/60">Opens in a separate window.</p>
                <button onclick="openEditor()"
                        class="btn btn-primary gap-2 w-full">
                    <i data-lucide="external-link" class="w-4 h-4"></i>
                    Open Editor
                </button>
            </div>

            <div id="status-open" class="hidden flex-col items-center gap-3 w-full">
                <div class="flex items-center gap-2 text-sm text-base-content/60">
                    <span class="loading loading-spinner loading-xs"></span>
                    Editor is open — switch to the draw.io window
                </div>
                <div id="save-status" class="text-sm font-medium hidden"></div>
                <p class="text-xs text-base-content/40">Keep this page open — it handles auto-save.</p>
                <div class="flex gap-2 w-full">
                    <button onclick="focusEditor()" class="btn btn-primary btn-sm flex-1 gap-1">
                        <i data-lucide="external-link" class="w-3.5 h-3.5"></i> Focus Editor
                    </button>
                    <button onclick="closeAndBack()" class="btn btn-ghost btn-sm flex-1 gap-1">
                        <i data-lucide="arrow-left" class="w-3.5 h-3.5"></i> Close & Back
                    </button>
                </div>
            </div>

        </div>
    </div>

    <div class="mt-4" id="back-area">
        <a href="{{ back_url }}" class="btn btn-ghost btn-sm gap-1">
            <i data-lucide="arrow-left" class="w-4 h-4"></i> Back to folder
        </a>
    </div>
</div>

<script>
var FETCH_URL = '{{ fetch_url }}';
var SAVE_URL  = '{{ save_url }}';
var BACK_URL  = '{{ back_url }}';
var editorWin = null;

function showStatus(text, ok) {
    var el = document.getElementById('save-status');
    el.textContent = text;
    el.className = 'text-sm font-medium ' + (ok ? 'text-success' : 'text-error');
    el.classList.remove('hidden');
    if (ok) setTimeout(function() { el.classList.add('hidden'); }, 3000);
}

function saveXml(xml) {
    showStatus('Saving…', true);
    fetch(SAVE_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ content: xml })
    }).then(function(r) {
        if (r.ok) showStatus('Saved ✓', true);
        else showStatus('Save failed (' + r.status + ')', false);
    }).catch(function() {
        showStatus('Save failed', false);
    });
}

function openEditor() {
    var features = 'width=1400,height=900,menubar=no,toolbar=no,location=no,resizable=yes,scrollbars=yes';
    editorWin = window.open(
        'https://embed.diagrams.net/?embed=1&proto=json&libraries=1',
        'drawio-editor',
        features
    );
    if (!editorWin) {
        alert('Popup was blocked. Please allow popups for this site and try again.');
        return;
    }
    document.getElementById('status-idle').classList.add('hidden');
    document.getElementById('back-area').classList.add('hidden');
    var open = document.getElementById('status-open');
    open.classList.remove('hidden');
    open.classList.add('flex');
}

function focusEditor() {
    if (editorWin && !editorWin.closed) editorWin.focus();
    else openEditor();
}

function closeAndBack() {
    if (editorWin && !editorWin.closed) editorWin.close();
    window.location.href = BACK_URL;
}

window.addEventListener('beforeunload', function(e) {
    if (editorWin && !editorWin.closed) {
        e.preventDefault();
        e.returnValue = 'The draw.io editor is still open. Close it first to avoid losing unsaved changes.';
    }
});

window.addEventListener('message', function(e) {
    if (!editorWin || e.source !== editorWin) return;
    var msg;
    try { msg = JSON.parse(e.data); } catch(err) { return; }

    if (msg.event === 'init') {
        // Fetch the XML from the server, then send it to the editor
        fetch(FETCH_URL)
            .then(function(r) { return r.text(); })
            .then(function(xml) {
                editorWin.postMessage(
                    JSON.stringify({ action: 'load', xml: xml, autosave: 1 }),
                    '*'
                );
            });
    } else if (msg.event === 'save' || msg.event === 'autosave') {
        if (msg.xml) saveXml(msg.xml);
    } else if (msg.event === 'exit') {
        editorWin.close();
        window.location.href = BACK_URL;
    }
});
</script>
{% endblock %}
