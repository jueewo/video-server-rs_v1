<!-- Shared Workspace Edit Modal — opened via openWorkspaceEditModal(id, name, description, tags) -->
<dialog id="ws-edit-modal" class="modal">
    <div class="modal-box">
        <h3 class="font-bold text-lg mb-5 flex items-center gap-2">
            <i data-lucide="settings" class="w-5 h-5"></i> Workspace Settings
        </h3>
        <div id="ws-edit-error" class="alert alert-error mb-4 hidden">
            <span id="ws-edit-error-msg"></span>
        </div>
        <div class="grid grid-cols-[8rem_1fr] items-start gap-x-4 gap-y-4 mb-6">
            <label for="ws-edit-name" class="label py-2 justify-end">
                <span class="label-text font-semibold text-right">Name <span class="text-error">*</span></span>
            </label>
            <input type="text" id="ws-edit-name" class="input input-bordered w-full" maxlength="100" />

            <label for="ws-edit-description" class="label py-2 justify-end">
                <span class="label-text font-semibold text-right">Description</span>
            </label>
            <div>
                <textarea id="ws-edit-description" class="textarea textarea-bordered w-full" rows="3"
                          maxlength="500" placeholder="Brief description of this workspace…"></textarea>
                <p class="text-xs text-base-content/50 mt-1">Optional</p>
            </div>

            <label class="label py-2 justify-end">
                <span class="label-text font-semibold text-right">Tags</span>
            </label>
            <div>
                <div id="ws-edit-tags-display" class="flex flex-wrap gap-1 mb-2 min-h-[1.5rem]"></div>
                <div class="flex gap-2">
                    <input type="text" id="ws-edit-tag-input"
                           class="input input-sm input-bordered flex-1"
                           placeholder="Add tag… (Enter or comma)"
                           maxlength="50" />
                    <button type="button" onclick="wsEditAddTagFromInput()" class="btn btn-sm btn-outline">
                        <i data-lucide="plus" class="w-3.5 h-3.5"></i>
                    </button>
                </div>
                <p class="text-xs text-base-content/50 mt-1">Press Enter or comma to add</p>
            </div>
        </div>
        <div class="modal-action">
            <button onclick="document.getElementById('ws-edit-modal').close()" class="btn btn-ghost">Cancel</button>
            <button id="ws-edit-save-btn" onclick="saveWorkspaceEdit()" class="btn btn-primary">Save</button>
        </div>
    </div>
    <form method="dialog" class="modal-backdrop"><button>close</button></form>
</dialog>
