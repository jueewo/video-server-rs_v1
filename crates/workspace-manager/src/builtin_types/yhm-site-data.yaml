id: yhm-site-data
name: "YHM Site Data"
icon: globe
description: "Static website project — edit data files and generate the Astro site"
color: "#0EA5E9"
git_template: null
metadata_schema:
  - key: components_dir
    label: "Astro Components Directory"
    type: string
    default: ""
    required: false
    description: "Server path to the static Astro components/layouts directory"
  - key: forgejo_repo
    label: "Forgejo Repository URL"
    type: string
    default: ""
    required: false
    description: "Forgejo repo URL for git push (e.g. https://forgejo.example.com/user/repo.git)"
  - key: forgejo_branch
    label: "Forgejo Branch"
    type: string
    default: "main"
    required: false
    description: "Branch to push generated site to"
  - key: forgejo_token
    label: "Forgejo Token"
    type: string
    default: ""
    required: false
    description: "Personal access token for Forgejo authentication"
apps: []
