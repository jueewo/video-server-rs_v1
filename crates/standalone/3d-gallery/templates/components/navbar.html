<!-- Navbar Component -->
<div x-data="{ mobileOpen: false }" class="sticky top-0 z-50">

    <!-- Main bar -->
    <div class="navbar bg-base-300 shadow-lg">

        <!-- Left: Logo -->
        <div class="flex-1">
            <a href="/" class="btn btn-ghost normal-case text-xl">
                <i data-lucide="film" class="w-6 h-6"></i>
                <span class="ml-2 hidden sm:inline">Media Server</span>
            </a>
        </div>

        <!-- Desktop nav (md and up) -->
        <div class="nav-desktop flex-none">
            <ul class="menu menu-horizontal px-1">
                <li><a href="/">Home</a></li>
                <li><a href="/media">All Media</a></li>
                <li><a href="/videos">Videos</a></li>
                <li><a href="/test">Live</a></li>
            </ul>

            <!-- Theme toggle (desktop) -->
            <button class="btn btn-ghost btn-circle ml-2" onclick="toggleTheme()" title="Toggle theme">
                <i data-lucide="moon" class="theme-moon-icon w-5 h-5"></i>
                <i data-lucide="sun" class="theme-sun-icon w-5 h-5 hidden"></i>
            </button>

            <!-- User menu avatar dropdown (desktop) -->
            {% include "components/user-menu.html" %}
        </div>

        <!-- Mobile right side: theme + hamburger -->
        <div class="nav-mobile gap-1">
            <button class="btn btn-ghost btn-circle" onclick="toggleTheme()" title="Toggle theme">
                <i data-lucide="moon" class="theme-moon-icon w-5 h-5"></i>
                <i data-lucide="sun" class="theme-sun-icon w-5 h-5 hidden"></i>
            </button>

            <button class="btn btn-ghost btn-circle" @click="mobileOpen = !mobileOpen" aria-label="Toggle menu">
                <!-- Hamburger -->
                <i x-show="!mobileOpen" data-lucide="menu" class="w-6 h-6"></i>
                <!-- X (close) -->
                <i x-show="mobileOpen" x-cloak data-lucide="x" class="w-6 h-6"></i>
            </button>
        </div>
    </div>

    <!-- Mobile dropdown menu -->
    <div
        x-show="mobileOpen"
        x-cloak
        x-transition:enter="transition ease-out duration-150"
        x-transition:enter-start="opacity-0 -translate-y-2"
        x-transition:enter-end="opacity-100 translate-y-0"
        x-transition:leave="transition ease-in duration-100"
        x-transition:leave-start="opacity-100 translate-y-0"
        x-transition:leave-end="opacity-0 -translate-y-2"
        @click.outside="mobileOpen = false"
        class="nav-mobile-menu bg-base-200 border-t border-base-300 shadow-lg"
    >
        <ul class="menu p-3 w-full text-base">
            <li><a href="/" @click="mobileOpen = false">Home</a></li>
            <li><a href="/media" @click="mobileOpen = false">All Media</a></li>
            <li><a href="/videos" @click="mobileOpen = false">Videos</a></li>
            <li><a href="/test" @click="mobileOpen = false">Live</a></li>

            {% if authenticated %}
            <li class="menu-title pt-3">Account</li>
            <li><a href="/profile" @click="mobileOpen = false">Profile</a></li>
            <li><a href="/groups" @click="mobileOpen = false">Groups</a></li>
            <li><a href="/vaults" @click="mobileOpen = false">Vaults</a></li>
            <li><a href="/workspaces" @click="mobileOpen = false">Workspaces</a></li>
            <li><a href="/tags/cloud" @click="mobileOpen = false">Tags</a></li>
            <li class="pt-1"><a href="/logout" class="text-error">Logout</a></li>
            {% else %}
            <li class="pt-1"><a href="/login" class="font-semibold">Login</a></li>
            {% endif %}
        </ul>
    </div>

</div>
