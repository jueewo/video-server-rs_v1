id: course
name: Structured Online Course
icon: graduation-cap
description: A course with modules and lessons
color: "#4CAF50"
git_template: null
apps:
  - app_id: course-viewer
    label: Open Course
    icon: graduation-cap
    url_template: /course?workspace_id={workspace_id}&folder={folder_path}
metadata_schema:
  - key: title
    label: Course Title
    type: string
    default: ""
    required: true
  - key: level
    label: Difficulty Level
    type: enum
    values: [beginner, intermediate, advanced]
    default: beginner
    required: false
  - key: instructor
    label: Instructor Name
    type: string
    default: ""
    required: false
  - key: description
    label: Course Description
    type: multiline
    default: ""
    required: false
agent_roles:
  - role: content-writer
    description: Creates and edits course modules and lessons
    default_actions:
      - Write new lesson
      - Edit lesson content
      - Generate quiz questions
  - role: course-planner
    description: Plans course structure, outlines modules and learning paths
    default_actions:
      - Plan module structure
      - Generate course outline
