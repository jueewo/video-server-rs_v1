name: Build & Push to Harbor

# Trigger manually from the Forgejo UI, or automatically on tags.
# Push to main does NOT auto-build — trigger manually when ready.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. 1.2.3) — leave blank for sha-only"
        required: false
        default: ""
      features:
        description: "Rust feature flags"
        required: false
        default: "full"
  push:
    tags:
      - "v*"

env:
  HARBOR_URL: ${{ vars.HARBOR_URL }}
  HARBOR_PROJECT: ${{ vars.HARBOR_PROJECT || 'media-server' }}
  IMAGE_NAME: app

jobs:
  build-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tags
        id: tags
        run: |
          FULL="${HARBOR_URL}/${HARBOR_PROJECT}/${IMAGE_NAME}"
          SHA=$(git rev-parse --short HEAD)
          echo "base=${FULL}" >> $GITHUB_OUTPUT
          echo "sha=${SHA}" >> $GITHUB_OUTPUT

          # Determine version: explicit input, git tag, or sha only
          VERSION="${{ github.event.inputs.version }}"
          if [[ -z "${VERSION}" && "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${{ github.ref_name }}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

          # Build comma-separated tag list for build-push-action
          TAGS="${FULL}:latest,${FULL}:${SHA}"
          if [[ -n "${VERSION}" ]]; then
            TAGS="${TAGS},${FULL}:${VERSION}"
          fi
          echo "tags=${TAGS}" >> $GITHUB_OUTPUT

      - name: Log in to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.HARBOR_URL }}
          username: ${{ secrets.HARBOR_USER }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            FEATURES=${{ github.event.inputs.features || 'full' }}
          labels: |
            git.sha=${{ steps.tags.outputs.sha }}
            build.date=${{ github.event.created }}
          cache-from: type=registry,ref=${{ steps.tags.outputs.base }}:buildcache
          cache-to: type=registry,ref=${{ steps.tags.outputs.base }}:buildcache,mode=max

      - name: Summary
        run: |
          echo "## Image pushed to Harbor" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.tags.outputs.tags }}" | tr ',' '\n' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Deploy on server:**" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "# Update MEDIA_SERVER_IMAGE in .env, then:" >> $GITHUB_STEP_SUMMARY
          echo "podman compose pull && podman compose up -d" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
