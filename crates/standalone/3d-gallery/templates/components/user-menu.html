<!-- User Menu Component -->
{% if authenticated %}
<div class="dropdown dropdown-end ml-2">
    <label tabindex="0" class="btn btn-ghost btn-circle avatar">
        <div class="w-10 rounded-full">
            <div
                class="bg-primary text-primary-content flex items-center justify-center w-full h-full rounded-full"
            >
                <i data-lucide="user" class="w-6 h-6"></i>
            </div>
        </div>
    </label>
    <ul
        tabindex="0"
        class="menu dropdown-content mt-3 z-1 p-2 shadow bg-base-200 rounded-box w-56"
    >
        <li><a href="/profile" class="text-base justify-center">Profile</a></li>
        <li><a href="/groups" class="text-base justify-center">Groups</a></li>
        <li><a href="/vaults" class="text-base justify-center">Vaults</a></li>
        <li><a href="/workspaces" class="text-base justify-center">Workspaces</a></li>
        <li><a href="/tags/cloud" class="text-base justify-center">Tags Cloud</a></li>
        <li class="mt-1"><a href="/logout" class="text-base justify-center text-error">Logout</a></li>
    </ul>
</div>
{% else %}
<a href="/login" class="btn btn-primary ml-2">Login</a>
{% endif %}
