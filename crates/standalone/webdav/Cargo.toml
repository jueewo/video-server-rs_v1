[package]
name = "webdav"
version = "0.1.0"
edition = "2021"

[dependencies]
axum = { workspace = true }
tokio = { workspace = true }
sqlx = { workspace = true }
tracing = { workspace = true }
serde = { workspace = true }
time = { workspace = true }
# Not yet in workspace.dependencies — pinned directly for now
http = "1"
bytes = "1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
base64 = "0.22"
futures-util = "0.3"
http-body-util = "0.1"
mime_guess = "2.0"

[[bin]]
name = "webdav-server"
path = "src/main.rs"
