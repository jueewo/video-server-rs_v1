# Copy .env.example to .env and fill in your values before running.
# Start: podman compose up -d
# Logs:  podman compose logs -f media-server
#
# Local Casdoor: if you don't have a central Casdoor instance, add it with:
#   podman compose -f docker-compose.yml -f docker-compose.casdoor.yml up -d

services:

  # ============================================================
  # Caddy — reverse proxy + automatic HTTPS (Let's Encrypt)
  # ============================================================
  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"    # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - DOMAIN=${DOMAIN:-localhost}
    depends_on:
      - media-server
    networks:
      - media-network

  # ============================================================
  # MediaMTX — RTMP ingest + HLS/WebRTC streaming
  # ============================================================
  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: mediamtx
    restart: unless-stopped
    ports:
      - "1935:1935"    # RTMP ingest
      - "8888:8888"    # HLS output
      - "8889:8889"    # WebRTC
      - "8554:8554"    # RTSP
      - "9997:9997"    # API
      - "9998:9998"    # Metrics (scraped by Prometheus)
    volumes:
      - ../mediamtx.yml:/mediamtx.yml:ro
      - ../livestreams:/recordings
    environment:
      - MTX_PROTOCOLS=tcp
      - MTX_LOGLEVEL=info
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9997/v3/config/get"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - media-network

  # ============================================================
  # Media Server — main Rust application
  # ============================================================
  # Production: set MEDIA_SERVER_IMAGE in .env to pull from Harbor.
  # Local dev:  leave MEDIA_SERVER_IMAGE unset — image is built from source.
  media-server:
    image: ${MEDIA_SERVER_IMAGE:-media-server:local}
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: media-server
    restart: unless-stopped
    ports:
      - "3000:3000"    # direct access (Caddy proxies this in production)
    volumes:
      - ../storage:/app/storage
      - ../media.db:/app/media.db
    environment:
      - RUST_LOG=${RUST_LOG:-info}
      - DATABASE_URL=sqlite:media.db
      - STORAGE_DIR=/app/storage
      - RUN_MODE=${RUN_MODE:-production}
      - SESSION_SECURE=${SESSION_SECURE:-true}
      - DOCS_ROOT=${DOCS_ROOT:-docs}
      - ENABLE_DEV_ROUTES=${ENABLE_DEV_ROUTES:-false}
      - RTMP_PUBLISH_TOKEN=${RTMP_PUBLISH_TOKEN:-changeme}
      - RATE_LIMIT_ENABLED=${RATE_LIMIT_ENABLED:-true}
      - RATE_LIMIT_AUTH_RPM=${RATE_LIMIT_AUTH_RPM:-10}
      - RATE_LIMIT_AUTH_BURST=${RATE_LIMIT_AUTH_BURST:-5}
      - RATE_LIMIT_UPLOAD_RPM=${RATE_LIMIT_UPLOAD_RPM:-15}
      - RATE_LIMIT_UPLOAD_BURST=${RATE_LIMIT_UPLOAD_BURST:-5}
      - RATE_LIMIT_MEDIA_SERVING_RPM=${RATE_LIMIT_MEDIA_SERVING_RPM:-2000}
      - RATE_LIMIT_MEDIA_SERVING_BURST=${RATE_LIMIT_MEDIA_SERVING_BURST:-500}
      - RATE_LIMIT_VALIDATION_RPM=${RATE_LIMIT_VALIDATION_RPM:-20}
      - RATE_LIMIT_VALIDATION_BURST=${RATE_LIMIT_VALIDATION_BURST:-10}
      - RATE_LIMIT_API_MUTATE_RPM=${RATE_LIMIT_API_MUTATE_RPM:-30}
      - RATE_LIMIT_API_MUTATE_BURST=${RATE_LIMIT_API_MUTATE_BURST:-10}
      - RATE_LIMIT_GENERAL_RPM=${RATE_LIMIT_GENERAL_RPM:-120}
      - RATE_LIMIT_GENERAL_BURST=${RATE_LIMIT_GENERAL_BURST:-30}

      # MediaMTX (internal network)
      - MEDIAMTX_HOST=mediamtx
      - MEDIAMTX_API_PORT=9997
      - MEDIAMTX_HLS_PORT=8888

      # OIDC — point at your central Casdoor instance
      - OIDC_ISSUER_URL=${OIDC_ISSUER_URL}
      - OIDC_CLIENT_ID=${OIDC_CLIENT_ID}
      - OIDC_CLIENT_SECRET=${OIDC_CLIENT_SECRET}
      - OIDC_REDIRECT_URL=https://${DOMAIN:-localhost}/auth/callback

      # Platform admin — set to your Casdoor user UUID (visible on /profile)
      - PLATFORM_ADMIN_ID=${PLATFORM_ADMIN_ID}

      # Site generator
      - SITE_COMPONENTS_DIR=/app/generator/static_files

      # OpenTelemetry
      - ENABLE_OTLP=true
      - OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_SERVICE_NAME=media-server

      # Emergency login — enable only for initial setup, disable in production
      # - ENABLE_EMERGENCY_LOGIN=true
      # - SU_USER=admin
      # - SU_PWD=changeme
    depends_on:
      mediamtx:
        condition: service_healthy
      otel-collector:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 3s
      start_period: 15s
      retries: 3
    networks:
      - media-network

  # ============================================================
  # Media MCP — AI assistant integration (Claude Desktop)
  # ============================================================
  # Connect Claude Desktop:
  #   "command": "docker", "args": ["compose", "exec", "-T", "media-mcp", "/app/media-mcp"]
  #   "cwd": "/path/to/your/media-server/docker"
  media-mcp:
    build:
      context: ..
      dockerfile: docker/Dockerfile.mcp
    container_name: media-mcp
    restart: unless-stopped
    volumes:
      - ../media.db:/app/media.db
      - ../storage:/app/storage
    environment:
      - DATABASE_PATH=/app/media.db
      - STORAGE_PATH=/app/storage
      - MCP_LOG_LEVEL=info
      - MCP_READ_ONLY=false
      - RUST_LOG=info
    stdin_open: true
    tty: true
    depends_on:
      media-server:
        condition: service_healthy
    networks:
      - media-network

  # ============================================================
  # OpenTelemetry Collector
  # ============================================================
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otel/config.yml"]
    volumes:
      - ./otel-collector-config.yml:/etc/otel/config.yml:ro
    ports:
      - "4317:4317"    # OTLP gRPC (media-server → collector)
      - "4318:4318"    # OTLP HTTP
      - "8890:8890"    # Prometheus scrape endpoint (note: 8889 is MediaMTX WebRTC)
    networks:
      - media-network

  # ============================================================
  # Prometheus
  # ============================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=90d'
    depends_on:
      - otel-collector
    networks:
      - media-network

  # ============================================================
  # Grafana
  # ============================================================
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-changeme}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=https://${DOMAIN:-localhost}/grafana
    depends_on:
      - prometheus
    networks:
      - media-network

networks:
  media-network:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
  prometheus_data:
  grafana_data:
