{% extends "base-tailwind.html" %} {% block title %}Emergency Login{% endblock
%} {% block content %}
<div
    class="min-h-[calc(100vh-4rem)] flex items-center justify-center bg-base-200 px-4"
>
    <div class="card w-full max-w-md bg-base-100 shadow-2xl">
        <div class="card-body">
            <!-- Header -->
            <div class="text-center mb-6">
                <div
                    class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-warning/10 mb-4"
                >
                    <i data-lucide="alert-triangle" class="w-8 h-8 text-warning"></i>
                </div>
                <h1 class="text-3xl font-bold">Emergency Login</h1>
            </div>

            <!-- Warning Alert -->
            <div class="alert alert-warning shadow-lg mb-6">
                <i data-lucide="alert-triangle" class="shrink-0 w-6 h-6"></i>
                <div>
                    <h3 class="font-bold">Warning</h3>
                    <div class="text-sm">
                        This is an emergency login option for system
                        administrators only. All login attempts are logged.
                    </div>
                </div>
            </div>

            <!-- Login Form -->
            <form
                method="POST"
                action="/login/emergency/auth"
                class="space-y-4"
            >
                <div class="w-full">
                    <label class="label" for="username">
                        <span class="font-semibold">Username</span>
                    </label>
                    <input
                        type="text"
                        id="username"
                        name="username"
                        placeholder="Enter your username"
                        class="input w-full"
                        required
                        autofocus
                    />
                </div>

                <div class="w-full">
                    <label class="label" for="password">
                        <span class="font-semibold">Password</span>
                    </label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="Enter your password"
                        class="input w-full"
                        required
                    />
                </div>

                <div class="mt-6 space-y-3">
                    <button
                        type="submit"
                        class="btn btn-primary btn-lg w-full gap-2"
                    >
                        <i data-lucide="log-in" class="w-5 h-5"></i>
                        Login
                    </button>
                    <a
                        href="/login"
                        class="btn btn-secondary btn-outline w-full gap-2"
                    >
                        <i data-lucide="arrow-left" class="w-5 h-5"></i>
                        Back to Login
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
