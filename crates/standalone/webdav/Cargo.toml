[package]
name = "webdav"
version = "0.1.0"
edition = "2021"

[dependencies]
axum = "0.8"
tokio = { version = "1", features = ["full"] }
sqlx = { version = "0.8", features = ["runtime-tokio-rustls", "sqlite"] }
http = "1"
bytes = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
base64 = "0.22"
serde = { version = "1", features = ["derive"] }
futures-util = "0.3"
http-body-util = "0.1"
mime_guess = "2.0"
time = { version = "0.3", features = ["formatting"] }

[[bin]]
name = "webdav-server"
path = "src/main.rs"
