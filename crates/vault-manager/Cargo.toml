[package]
name = "vault-manager"
version = "0.1.0"
edition = "2021"

[dependencies]
# Web framework
axum = "0.7"

# Templates
askama = "0.12"
askama_axum = "0.4"

# Database
sqlx = { version = "0.8", features = ["sqlite", "runtime-tokio"] }

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Async runtime
tokio = { version = "1", features = ["full"] }

# Sessions
tower-sessions = "0.13"

# Logging
tracing = "0.1"

# Time
time = { version = "0.3", features = ["formatting", "parsing"] }

# Error handling
anyhow = "1.0"

# Internal dependencies
common = { path = "../common" }
