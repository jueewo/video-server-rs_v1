id: presentation
name: Reveal.js Presentation
icon: presentation
description: Markdown-based slide presentation using Reveal.js
color: "#7C3AED"
git_template: null
apps:
  - app_id: presentation-viewer
    label: Open Presentation
    icon: presentation
    url_template: /presentation
metadata_schema:
  - key: title
    label: Presentation Title
    type: string
    default: ""
    required: true
  - key: theme
    label: Reveal.js Theme
    type: enum
    values: [white, black, league, beige, sky, night, serif, simple, solarized, moon, dracula]
    default: white
    required: false
  - key: description
    label: Description
    type: multiline
    default: ""
    required: false
agent_roles:
  - role: content-writer
    description: Creates and edits presentation slides
    default_actions:
      - Write new slides
      - Edit slide content
      - Add speaker notes
  - role: slide-designer
    description: Improves slide structure and visual layout
    default_actions:
      - Restructure slides
      - Improve visual hierarchy
  - role: presentation-generator
    description: Generates a concise presentation from a course folder by reading all lessons, extracting key concepts, and producing slide-appropriate content
    default_actions:
      - Generate slides from course
    input_context:
      - source: course-folder
        description: Path to the source course folder within the same workspace. The agent reads course.yaml, all module/lesson markdown files, and preserves references to media embeds, math blocks, code snippets (shortened), and mermaid diagrams.
    output:
      - file: slides.md
        description: A Reveal.js-compatible markdown file with --- slide separators. Should contain 15-30 slides that distill the course into key teaching points, not a verbatim copy. Each lesson should be summarized, not pasted in full.
