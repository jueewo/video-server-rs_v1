# Deployment configuration — topology and tenant settings.
# Edit with care; affects security posture and data scoping.
# See branding.yaml for visual identity settings.

# Deployment mode:
#   hosted     — multi-tenant, your infrastructure (Tier 1 / Tier 2)
#   standalone — single-tenant, customer's own infrastructure (Tier 3)
deployment_mode: hosted

# Fixed tenant identity — used only when deployment_mode: standalone.
# Ignored in hosted mode (tenants are resolved from the database).
# tenant_id: "acme"
# tenant_name: "Acme Corp"

# Federation — pull-based multi-server content sharing.
# Each server has a unique server_id (auto-generated UUID on first run if omitted).
# server_id: "auto"
# server_url: "https://your-server.example.com"
# federation_enabled: false
# federation_sync_interval_minutes: 15
