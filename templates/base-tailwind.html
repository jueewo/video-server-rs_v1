<!doctype html>
<html lang="en" data-theme="light">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>{% block title %}Media Server{% endblock %}</title>
        <link rel="icon" type="image/webp" href="/static/icon.webp" />
        <link rel="apple-touch-icon" href="/static/icon.webp" />

        <!-- TailwindCSS + DaisyUI -->
        <link rel="stylesheet" href="/static/css/tailwind.css" />

        <!-- Lucide icons -->
        <script src="https://unpkg.com/lucide@latest"></script>

        <!-- HTMX for dynamic interactions -->
        <script src="https://unpkg.com/htmx.org@1.9.10"></script>

        <!-- Alpine.js for client-side interactivity -->
        <script
            defer
            src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"
        ></script>

        <style>
            [x-cloak] {
                display: none !important;
            }
        </style>

        {% block extra_head %}{% endblock %}
    </head>
    <body class="bg-base-100 min-h-screen flex flex-col">
        <!-- Navbar -->
        {% include "components/navbar.html" %}

        <!-- Main Content -->
        <main class="flex-1">{% block content %}{% endblock %}</main>

        <!-- Footer -->
        <footer class="border-t border-base-300 py-3 px-4 text-xs text-base-content/40 flex justify-center gap-6">
            <span>© jueewo ventures GmbH</span>
            <a href="/impressum" class="hover:text-base-content transition-colors">Impressum</a>
            <a href="/privacy" class="hover:text-base-content transition-colors">Datenschutz</a>
        </footer>

        <!-- Toast Container -->
        <div
            id="toast-container"
            class="toast toast-top toast-end z-50"
            aria-live="polite"
            aria-atomic="false"
        ></div>

        <!-- Global Confirm Dialog Modal -->
        <div x-data="confirmDialog()"
             x-show="open"
             x-cloak
             class="fixed inset-0 z-50 overflow-y-auto"
             @keydown.escape.window="close()"
             @show-confirm.window="showWithCallback($event.detail.title, $event.detail.message, $event.detail.callback)"
             id="global-confirm-dialog">
            <!-- Backdrop -->
            <div class="fixed inset-0 bg-black bg-opacity-50 transition-opacity"
                 @click="close()"></div>

            <!-- Dialog -->
            <div class="flex min-h-screen items-center justify-center p-4">
                <div class="relative bg-base-100 rounded-lg shadow-xl max-w-md w-full p-6"
                     @click.stop>
                    <!-- Icon -->
                    <div class="mx-auto flex h-12 w-12 items-center justify-center rounded-full bg-error bg-opacity-10 mb-4">
                        <i data-lucide="triangle-alert" class="h-6 w-6 text-error"></i>
                    </div>

                    <!-- Title -->
                    <h3 class="text-lg font-semibold text-center mb-2" x-text="title"></h3>

                    <!-- Message -->
                    <p class="text-sm text-base-content text-opacity-70 text-center mb-6" x-text="message"></p>

                    <!-- Actions -->
                    <div class="flex gap-3">
                        <button @click="close()" class="btn btn-ghost flex-1">
                            Cancel
                        </button>
                        <button @click="if(callback) callback(); close();"
                                class="btn btn-error flex-1">
                            Confirm
                        </button>
                    </div>
                </div>
            </div>
        </div>

        {% block extra_scripts %}{% endblock %}

        <!-- Alpine.js reusable components (registered before Alpine initialises) -->
        <script>
            document.addEventListener("alpine:init", () => {
                // Confirm dialog
                // Usage: wrap a section with x-data="confirmDialog()"
                //
                // Form-submission mode (default):
                //   show(title, message, actionUrl, method = "POST")
                //   — submits a form to actionUrl with the given method
                //
                // Callback mode (for JS/fetch actions, e.g. REST DELETE):
                //   showWithCallback(title, message, callbackFn)
                //   — calls callbackFn() when the user confirms
                Alpine.data("confirmDialog", () => ({
                    open: false,
                    title: "",
                    message: "",
                    actionUrl: "",
                    method: "POST",
                    callback: null,
                    show(title, message, url, method = "POST") {
                        this.title = title;
                        this.message = message;
                        this.actionUrl = url;
                        this.method = method;
                        this.callback = null;
                        this.open = true;
                    },
                    showWithCallback(title, message, cb) {
                        this.title = title;
                        this.message = message;
                        this.actionUrl = "";
                        this.callback = cb;
                        this.open = true;
                    },
                    close() {
                        this.open = false;
                        this.callback = null;
                    },
                }));

                // Action menu (three-dot card overlay)
                // Usage: x-data="actionMenu()" on a parent element
                Alpine.data("actionMenu", () => ({
                    open: false,
                    toggle() {
                        this.open = !this.open;
                    },
                    close() {
                        this.open = false;
                    },
                }));

                // Global helper functions using Alpine's event system
                window.showConfirmDialog = function(title, message, url, method = "POST") {
                    window.dispatchEvent(new CustomEvent('show-confirm', {
                        detail: { title, message, url, method, callback: null }
                    }));
                };

                window.showWithCallback = function(title, message, callback) {
                    window.dispatchEvent(new CustomEvent('show-confirm', {
                        detail: { title, message, callback }
                    }));
                };

                console.log('✅ Global dialog functions registered');
            });
        </script>

        <script>
            // Global utilities
            function copyToClipboard(text) {
                navigator.clipboard
                    .writeText(text)
                    .then(() => {
                        showToast("Copied to clipboard!", "success");
                    })
                    .catch(() => {
                        showToast("Failed to copy", "error");
                    });
            }

            function showToast(message, type = "info") {
                const toast = document.createElement("div");
                toast.className = `alert alert-${type} shadow-lg mb-2`;
                toast.innerHTML = `
                <div>
                    <span>${message}</span>
                </div>
            `;
                document.getElementById("toast-container").appendChild(toast);
                setTimeout(() => toast.remove(), 3000);
            }

            // Theme switcher
            function toggleTheme() {
                const html = document.documentElement;
                const current = html.getAttribute("data-theme");
                const newTheme = current === "light" ? "dark" : "light";
                html.setAttribute("data-theme", newTheme);
                localStorage.setItem("theme", newTheme);
                updateThemeIcon(newTheme);
            }

            // Update theme icons (multiple instances for desktop + mobile)
            function updateThemeIcon(theme) {
                document.querySelectorAll(".theme-moon-icon").forEach(el => {
                    el.classList.toggle("hidden", theme === "dark");
                });
                document.querySelectorAll(".theme-sun-icon").forEach(el => {
                    el.classList.toggle("hidden", theme !== "dark");
                });
            }

            // Load saved theme
            const savedTheme = localStorage.getItem("theme") || "light";
            document.documentElement.setAttribute("data-theme", savedTheme);

            // Set initial icon state
            document.addEventListener("DOMContentLoaded", function () {
                updateThemeIcon(savedTheme);
                lucide.createIcons();
            });

            // Re-render icons after HTMX content swaps
            document.addEventListener("htmx:afterSwap", () => lucide.createIcons());
        </script>
    </body>
</html>
