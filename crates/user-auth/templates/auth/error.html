{% extends "base-tailwind.html" %} {% block title %}Authentication Error{%
endblock %} {% block content %}
<div
    class="min-h-[calc(100vh-4rem)] flex items-center justify-center bg-base-200 px-4"
>
    <div class="card w-full max-w-md bg-base-100 shadow-2xl">
        <div class="card-body">
            <!-- Header -->
            <div class="text-center mb-6">
                <div
                    class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-error/10 mb-4"
                >
                    <i data-lucide="alert-triangle" class="w-8 h-8 text-error"></i>
                </div>
                <h1 class="text-3xl font-bold mb-4">Authentication Error</h1>
            </div>

            <!-- Error Alert -->
            <div class="alert alert-error shadow-lg mb-6">
                <i data-lucide="x-circle" class="shrink-0 w-6 h-6"></i>
                <div class="flex-1">
                    <h3 class="font-bold">{{ reason }}</h3>
                    {% match detail %} {% when Some with (d) %}
                    <div class="text-sm mt-1">{{ d }}</div>
                    {% when None %}
                    <div class="text-sm mt-1">
                        No additional details available
                    </div>
                    {% endmatch %}
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="space-y-3">
                <a href="/login" class="btn btn-primary btn-lg w-full gap-2">
                    <i data-lucide="log-in" class="w-5 h-5"></i>
                    Back to Login
                </a>
                <a href="/" class="btn btn-secondary btn-outline w-full gap-2">
                    <i data-lucide="home" class="w-5 h-5"></i>
                    Go to Home
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
