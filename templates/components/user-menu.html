<!-- User Menu Component -->
{% if authenticated %}
<div class="dropdown dropdown-end ml-2">
    <label tabindex="0" class="btn btn-ghost btn-circle avatar">
        <div class="w-10 rounded-full">
            <div
                class="bg-primary text-primary-content flex items-center justify-center w-full h-full rounded-full"
            >
                <i data-lucide="user" class="h-6 w-6"></i>
            </div>
        </div>
    </label>
    <ul
        tabindex="0"
        class="menu dropdown-content mt-3 z-1 p-2 shadow bg-base-200 rounded-box w-56"
    >
        <li class="menu-title text-xs">Workspaces</li>
        <li><a href="/workspaces" class="text-base justify-center gap-2"><i data-lucide="layout-dashboard" class="w-4 h-4"></i> Workspaces</a></li>
        <li><a href="/folder-types" class="text-base justify-center gap-2"><i data-lucide="folder-open" class="w-4 h-4"></i> Folder Types</a></li>
        <li class="menu-title text-xs pt-2">Apps</li>
        <li><a href="/apps" class="text-base justify-center gap-2"><i data-lucide="layout-grid" class="w-4 h-4"></i> Apps</a></li>
        <li><a href="/my-apps" class="text-base justify-center gap-2"><i data-lucide="rocket" class="w-4 h-4"></i> Published</a></li>
        <li><a href="/js-apps" class="text-base justify-center gap-2"><i data-lucide="play-circle" class="w-4 h-4"></i> Live Preview</a></li>
        <li class="menu-title text-xs pt-2">Media</li>
        <li><a href="/media" class="text-base justify-center gap-2"><i data-lucide="film" class="w-4 h-4"></i> Media</a></li>
        <li><a href="/vaults" class="text-base justify-center gap-2"><i data-lucide="package" class="w-4 h-4"></i> Vaults</a></li>
        <li><a href="/groups" class="text-base justify-center gap-2"><i data-lucide="users" class="w-4 h-4"></i> Groups</a></li>
        <li class="menu-title text-xs pt-2">Account</li>
        <li><a href="/profile" class="text-base justify-center gap-2"><i data-lucide="user" class="w-4 h-4"></i> Profile</a></li>
        <li><a href="/admin/tenants" class="text-base justify-center gap-2"><i data-lucide="building-2" class="w-4 h-4"></i> Tenants</a></li>
        <li class="mt-1"><a href="/logout" class="text-base justify-center text-error gap-2"><i data-lucide="log-out" class="w-4 h-4"></i> Logout</a></li>
    </ul>
</div>
{% else %}
<a href="/login" class="btn btn-primary ml-2 gap-2"><i data-lucide="lock" class="w-4 h-4"></i> Login</a>
{% endif %}
