<!-- User Menu Component -->
{% if authenticated %}
<div class="dropdown dropdown-end ml-2">
    <label tabindex="0" class="btn btn-ghost btn-circle avatar">
        <div class="w-10 rounded-full">
            <div
                class="bg-primary text-primary-content flex items-center justify-center w-full h-full rounded-full"
            >
                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    class="h-6 w-6"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke="currentColor"
                >
                    <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        stroke-width="2"
                        d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"
                    />
                </svg>
            </div>
        </div>
    </label>
    <ul
        tabindex="0"
        class="menu menu-sm dropdown-content mt-3 z-1 p-2 shadow bg-base-200 rounded-box w-52"
    >
        <li><a href="/profile">👤 Profile</a></li>
        <li><a href="/groups">👥 Groups</a></li>
        <li><a href="/vaults">📦 Vaults</a></li>
        <li><a href="/tags/cloud">🏷️ Tags Cloud</a></li>
        <li>---</li>
        <li><a href="/logout">🚪 Logout</a></li>
    </ul>
</div>
{% else %}
<a href="/login" class="btn btn-primary ml-2"> 🔐 Login </a>
{% endif %}
