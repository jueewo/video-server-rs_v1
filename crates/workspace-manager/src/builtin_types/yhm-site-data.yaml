id: yhm-site-data
name: "YHM Site Data"
icon: globe
description: "Static website project — edit data files and generate the Astro site"
color: "#0EA5E9"
git_template: null
metadata_schema:
  - key: components_dir
    label: "Astro Components Directory"
    type: string
    default: ""
    required: false
    description: "Server path to the static Astro components/layouts directory"
apps: []
agent_roles:
  - role: content-writer
    description: Creates and edits site data files and content
    default_actions:
      - Write new page
      - Edit page content
      - Update site config
