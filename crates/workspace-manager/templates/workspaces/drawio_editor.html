{% extends "base-tailwind.html" %}
{% block title %}{{ file_name }} — draw.io{% endblock %}
{% block content %}
<div class="container mx-auto px-4 py-12 max-w-lg text-center">

    <div class="card bg-base-100 border border-base-300 shadow-sm">
        <div class="card-body items-center gap-4 py-10">

            <span class="inline-flex items-center justify-center w-14 h-14 rounded-2xl"
                  style="background: linear-gradient(135deg, #667eea, #764ba2); box-shadow: 0 4px 16px rgba(102,126,234,0.35);">
                <i data-lucide="workflow" class="w-7 h-7 text-white"></i>
            </span>

            <div>
                <h1 class="text-lg font-semibold">{{ file_name }}</h1>
                <p class="text-sm text-base-content/50 mt-0.5">draw.io diagram</p>
            </div>

            <!-- Status area -->
            <div id="status-idle" class="flex flex-col items-center gap-3 w-full">
                <p class="text-sm text-base-content/60">Opens in a separate window.</p>
                <button id="open-btn" onclick="openEditor()"
                        class="btn btn-primary gap-2 w-full">
                    <i data-lucide="external-link" class="w-4 h-4"></i>
                    Open Editor
                </button>
            </div>

            <div id="status-open" class="hidden flex-col items-center gap-3 w-full">
                <div class="flex items-center gap-2 text-sm text-base-content/60">
                    <span class="loading loading-spinner loading-xs"></span>
                    Editor is open — switch to the draw.io window
                </div>
                <div id="save-status" class="text-sm font-medium hidden"></div>
                <div class="flex gap-2 w-full">
                    <button onclick="openEditor()" class="btn btn-outline btn-sm flex-1 gap-1">
                        <i data-lucide="refresh-cw" class="w-3.5 h-3.5"></i> Reopen
                    </button>
                    <a href="{{ back_url }}" class="btn btn-ghost btn-sm flex-1 gap-1">
                        <i data-lucide="arrow-left" class="w-3.5 h-3.5"></i> Back
                    </a>
                </div>
            </div>

        </div>
    </div>

    <div class="mt-4">
        <a href="{{ back_url }}" id="back-link" class="btn btn-ghost btn-sm gap-1">
            <i data-lucide="arrow-left" class="w-4 h-4"></i> Back to folder
        </a>
    </div>
</div>

<script>
const SAVE_URL    = {{ save_url|json }};
const XML_CONTENT = {{ xml_content|json }};
const BACK_URL    = {{ back_url|json }};

let editorWin = null;

function showStatus(text, cls) {
    const el = document.getElementById('save-status');
    el.textContent = text;
    el.className = 'text-sm font-medium ' + cls;
    el.classList.remove('hidden');
    if (cls.includes('success')) setTimeout(() => el.classList.add('hidden'), 3000);
}

async function saveXml(xml) {
    showStatus('Saving…', 'text-base-content/50');
    try {
        const resp = await fetch(SAVE_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ content: xml }),
        });
        if (resp.ok) {
            showStatus('Saved ✓', 'text-success');
        } else {
            showStatus('Save failed', 'text-error');
        }
    } catch {
        showStatus('Save failed', 'text-error');
    }
}

function openEditor() {
    const features = 'width=1400,height=900,menubar=no,toolbar=no,location=no,resizable=yes,scrollbars=yes';
    editorWin = window.open('https://app.diagrams.net/?embed=1&proto=json&libraries=1', 'drawio-editor', features);

    if (!editorWin) {
        alert('Popup blocked — please allow popups for this site and try again.');
        return;
    }

    document.getElementById('status-idle').classList.add('hidden');
    document.getElementById('status-open').classList.remove('hidden');
    document.getElementById('status-open').classList.add('flex');
}

window.addEventListener('message', function(e) {
    if (!editorWin || e.source !== editorWin) return;
    let msg;
    try { msg = JSON.parse(e.data); } catch { return; }

    switch (msg.event) {
        case 'init':
            editorWin.postMessage(JSON.stringify({ action: 'load', xml: XML_CONTENT, autosave: 1 }), '*');
            break;
        case 'save':
        case 'autosave':
            if (msg.xml) saveXml(msg.xml);
            break;
        case 'exit':
            editorWin.close();
            window.location.href = BACK_URL;
            break;
    }
});

</script>
{% endblock %}
