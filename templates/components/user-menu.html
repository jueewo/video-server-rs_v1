<!-- User Menu Component -->
{% if authenticated %}
<div class="dropdown dropdown-end ml-2">
    <label tabindex="0" class="btn btn-ghost btn-circle avatar">
        <div class="w-10 rounded-full">
            <div class="bg-primary text-primary-content flex items-center justify-center w-full h-full rounded-full">
                <i data-lucide="user" class="h-6 w-6"></i>
            </div>
        </div>
    </label>
    <ul tabindex="0" class="menu dropdown-content mt-3 z-[1] p-2 shadow bg-base-200 rounded-box w-52">
        <li><a href="/workspaces" class="gap-2"><i data-lucide="layout-dashboard" class="w-4 h-4"></i> Workspaces</a></li>
        <li><a href="/media" class="gap-2"><i data-lucide="film" class="w-4 h-4"></i> Media</a></li>
        <li><a href="/apps" class="gap-2"><i data-lucide="layout-grid" class="w-4 h-4"></i> Apps</a></li>
        <li><a href="/appstore" class="gap-2"><i data-lucide="store" class="w-4 h-4"></i> App Store</a></li>
        <li><a href="/agents" class="gap-2"><i data-lucide="bot" class="w-4 h-4"></i> Agents</a></li>
        <li><a href="/docs" class="gap-2"><i data-lucide="book-open" class="w-4 h-4"></i> Docs</a></li>
        <li><a href="/federation" class="gap-2"><i data-lucide="network" class="w-4 h-4"></i> Federation</a></li>
        <li class="divider my-0.5"></li>
        <li class="menu-title text-xs opacity-50">Services</li>
        <li><a href="http://localhost:4100" target="_blank" class="gap-2"><i data-lucide="workflow" class="w-4 h-4"></i> Process Runtime <i data-lucide="external-link" class="w-3 h-3 opacity-50"></i></a></li>
        <li class="divider my-0.5"></li>
        <li><a href="/settings" class="gap-2"><i data-lucide="settings-2" class="w-4 h-4"></i> Settings</a></li>
        <li><a href="/profile" class="gap-2"><i data-lucide="user" class="w-4 h-4"></i> Profile</a></li>
        <li><a href="/logout" class="gap-2 text-error"><i data-lucide="log-out" class="w-4 h-4"></i> Logout</a></li>
    </ul>
</div>
{% else %}
<a href="/login" class="btn btn-primary ml-2 gap-2"><i data-lucide="lock" class="w-4 h-4"></i> Login</a>
{% endif %}
