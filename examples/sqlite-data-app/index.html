<!DOCTYPE html>
<html lang="en" data-theme="business">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQLite Data Dashboard</title>
    <link href="/static/vendor/daisyui.min.css" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body { font-family: system-ui, -apple-system, sans-serif; margin: 0; padding: 1.5rem; background: oklch(0.2 0.015 260); color: oklch(0.9 0 0); overflow-x: hidden; max-width: 100%; }
        .grid-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
        .stat-card { background: oklch(0.25 0.015 260); border-radius: 0.75rem; padding: 1.25rem; }
        .stat-card .label { font-size: 0.8rem; opacity: 0.6; text-transform: uppercase; letter-spacing: 0.05em; }
        .stat-card .value { font-size: 1.8rem; font-weight: 700; margin-top: 0.25rem; }
        .query-section { background: oklch(0.25 0.015 260); border-radius: 0.75rem; padding: 1.5rem; margin-bottom: 2rem; overflow: hidden; }
        textarea { width: 100%; max-width: 100%; min-height: 80px; background: oklch(0.18 0.015 260); color: oklch(0.9 0 0); border: 1px solid oklch(0.35 0.015 260); border-radius: 0.5rem; padding: 0.75rem; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 0.85rem; resize: vertical; }
        textarea:focus { outline: none; border-color: oklch(0.6 0.15 250); }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th { text-align: left; padding: 0.6rem 0.75rem; background: oklch(0.22 0.015 260); font-weight: 600; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; opacity: 0.7; }
        td { padding: 0.6rem 0.75rem; border-bottom: 1px solid oklch(0.3 0.015 260); }
        tr:hover td { background: oklch(0.28 0.015 260); }
        .db-chart { display: flex; align-items: flex-end; gap: 4px; height: 200px; }
        .db-bar-group { display: flex; align-items: flex-end; flex: 1; gap: 2px; height: 100%; }
        .db-bar { flex: 1; border-radius: 3px 3px 0 0; min-width: 4px; }
        .db-bar-wrap { display: flex; flex-direction: column; align-items: center; flex: 1; gap: 4px; }
        .db-bar-label { font-size: 0.65rem; opacity: 0.5; text-align: center; white-space: nowrap; }
        .chart-title { font-size: 0.9rem; font-weight: 600; margin-bottom: 0.5rem; }
        .colors-hw { background: oklch(0.65 0.2 150); }
        .colors-co { background: oklch(0.65 0.2 250); }
        .colors-sw { background: oklch(0.65 0.2 310); }
        .colors-ed { background: oklch(0.65 0.2 50); }
        .db-legend { display: flex; gap: 1rem; margin-top: 0.5rem; font-size: 0.75rem; }
        .db-legend-dot { width: 10px; height: 10px; border-radius: 2px; display: inline-block; margin-right: 4px; vertical-align: middle; }
        .db-status { font-size: 0.8rem; opacity: 0.5; margin-top: 1rem; }
        h1 { font-size: 1.4rem; font-weight: 700; margin: 0 0 0.25rem 0; }
        .subtitle { font-size: 0.85rem; opacity: 0.5; margin-bottom: 1.5rem; }
        .btn-run { background: oklch(0.55 0.15 250); color: white; border: none; padding: 0.5rem 1.25rem; border-radius: 0.5rem; cursor: pointer; font-weight: 600; font-size: 0.85rem; }
        .btn-run:hover { background: oklch(0.6 0.15 250); }
        .results-wrap { overflow-x: auto; max-height: 400px; overflow-y: auto; border-radius: 0.5rem; margin-top: 1rem; }
        .error { color: oklch(0.7 0.2 25); background: oklch(0.25 0.05 25); padding: 0.75rem; border-radius: 0.5rem; font-family: monospace; font-size: 0.85rem; }
    </style>
</head>
<body>
    <h1>SQLite Data Dashboard</h1>
    <p class="subtitle">Querying a bundled <code>data.db</code> file — everything runs in your browser via WebAssembly.</p>

    <div id="loading">Loading database...</div>
    <div id="app" style="display:none">
        <!-- Stats -->
        <div class="grid-cards" id="stats"></div>

        <!-- Chart -->
        <div class="query-section">
            <div class="chart-title">Monthly Revenue by Category</div>
            <div class="db-chart" id="chart"></div>
            <div class="db-legend" id="legend"></div>
        </div>

        <!-- Custom query -->
        <div class="query-section">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:0.75rem">
                <div class="chart-title">Run Custom SQL</div>
                <button class="btn-run" onclick="runQuery()">Run</button>
            </div>
            <textarea id="sql">SELECT category, COUNT(*) as products, ROUND(SUM(price * units_sold), 0) as total_revenue
FROM products
GROUP BY category
ORDER BY total_revenue DESC</textarea>
            <div id="results"></div>
        </div>

    </div>
    <div class="db-status" id="status"></div>

    <script src="/static/vendor/sql-js/sql-wasm.js"></script>
    <script>
        const WASM_URL = '/static/vendor/sql-js/sql-wasm.wasm';

        // Resolve data.db relative to this app's directory
        const base = document.baseURI.replace(/\/[^/]*$/, '');
        const DB_URL = base + '/data.db';

        let db;

        async function init() {
            try {
                const SQL = await initSqlJs({ locateFile: () => WASM_URL });

                // Fetch the database file
                const response = await fetch(DB_URL);
                if (!response.ok) throw new Error(`Failed to load data.db: ${response.status}`);
                const buf = await response.arrayBuffer();
                db = new SQL.Database(new Uint8Array(buf));

                document.getElementById('loading').style.display = 'none';
                document.getElementById('app').style.display = 'block';

                renderStats();
                renderChart();
                runQuery();

                const size = (buf.byteLength / 1024).toFixed(1);
                document.getElementById('status').innerHTML =
                    `Database: ${size} KB &middot; sql.js (WASM) &middot; Client-side only`;
            } catch (err) {
                document.getElementById('loading').innerHTML =
                    `<div class="error">Error: ${err.message}</div>`;
            }
        }

        function query(sql) {
            return db.exec(sql);
        }

        function renderStats() {
            const stats = [
                { label: 'Products', sql: 'SELECT COUNT(*) FROM products' },
                { label: 'Categories', sql: 'SELECT COUNT(DISTINCT category) FROM products' },
                { label: 'Total Revenue', sql: "SELECT ROUND(SUM(price * units_sold), 0) FROM products", format: 'currency' },
                { label: 'Avg Price', sql: 'SELECT ROUND(AVG(price), 2) FROM products', format: 'currency' },
            ];

            const container = document.getElementById('stats');
            container.innerHTML = stats.map(s => {
                const result = query(s.sql);
                let value = result[0]?.values[0]?.[0] ?? 0;
                if (s.format === 'currency') value = '\u20ac' + Number(value).toLocaleString('de-DE');
                return `<div class="stat-card"><div class="label">${s.label}</div><div class="value">${value}</div></div>`;
            }).join('');
        }

        function renderChart() {
            const result = query(`
                SELECT month, category, revenue
                FROM monthly_revenue
                ORDER BY month, category
            `);
            if (!result.length) return;

            const rows = result[0].values;
            const months = [...new Set(rows.map(r => r[0]))];
            const categories = [...new Set(rows.map(r => r[1]))];
            const maxVal = Math.max(...rows.map(r => r[2]));

            const colorMap = { Hardware: 'colors-hw', Consulting: 'colors-co', Software: 'colors-sw', Education: 'colors-ed' };

            const chartHeight = 180;
            const chart = document.getElementById('chart');
            chart.innerHTML = months.map(m => {
                const monthRows = rows.filter(r => r[0] === m);
                const bars = categories.map(cat => {
                    const row = monthRows.find(r => r[1] === cat);
                    const val = row ? row[2] : 0;
                    const h = Math.round((val / maxVal) * chartHeight);
                    return `<div class="db-bar ${colorMap[cat] || ''}" style="height:${h}px" title="${cat}: \u20ac${val.toLocaleString()}"></div>`;
                }).join('');
                return `<div class="db-bar-wrap"><div class="db-bar-group">${bars}</div><div class="db-bar-label">${m.slice(5)}</div></div>`;
            }).join('');

            document.getElementById('legend').innerHTML = categories.map(cat =>
                `<span><span class="db-legend-dot ${colorMap[cat] || ''}"></span>${cat}</span>`
            ).join('');
        }

        window.runQuery = function() {
            const sql = document.getElementById('sql').value.trim();
            const container = document.getElementById('results');
            if (!sql) { container.innerHTML = ''; return; }

            try {
                const results = query(sql);
                if (!results.length) {
                    container.innerHTML = '<div style="opacity:0.5;margin-top:0.75rem">No results.</div>';
                    return;
                }
                const { columns, values } = results[0];
                const html = `<div class="results-wrap"><table>
                    <thead><tr>${columns.map(c => `<th>${c}</th>`).join('')}</tr></thead>
                    <tbody>${values.map(row =>
                        `<tr>${row.map(v => `<td>${v ?? '<em>NULL</em>'}</td>`).join('')}</tr>`
                    ).join('')}</tbody>
                </table></div>`;
                container.innerHTML = html;
            } catch (err) {
                container.innerHTML = `<div class="error">${err.message}</div>`;
            }
        };

        init();
    </script>
</body>
</html>
