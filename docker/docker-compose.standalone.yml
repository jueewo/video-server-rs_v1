# Standalone deployment compose file — minimal self-hosting
#
# Quick start:
#   ./scripts/quickstart-test.sh          # creates .env, config, branding, empty DB
#   podman compose -f docker-compose.standalone.yml up -d
#
# Manual setup:
#   1. cp .env.standalone.example .env
#   2. cp branding.yaml.example ../branding.yaml
#   3. cp config.yaml.example ../config.yaml
#   4. touch ../media.db && mkdir -p ../storage
#   5. podman compose -f docker-compose.standalone.yml up -d

services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: platform
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-3000}:3000"
    volumes:
      # Persistent storage — all media, thumbnails, and vaults
      - storage:/app/storage
      # Persistent database (:z for SELinux on RHEL/Rocky)
      - ../media.db:/app/media.db:z
      # Branding and deployment config — edits take effect on restart
      - ../branding.yaml:/app/branding.yaml:ro,z
      - ../config.yaml:/app/config.yaml:ro,z
      # Custom static assets (logo, favicon) — drop files here
      - ../static/custom:/app/static/custom:ro,z
    environment:
      - RUST_LOG=${RUST_LOG:-info}
      - DATABASE_URL=sqlite:media.db
      - STORAGE_DIR=/app/storage

      # MediaMTX (internal network)
      - MEDIAMTX_HOST=mediamtx
      - MEDIAMTX_API_PORT=9997
      - MEDIAMTX_HLS_PORT=8888

      # OIDC — set in .env or uncomment here
      - OIDC_ISSUER_URL=${OIDC_ISSUER_URL:-}
      - OIDC_CLIENT_ID=${OIDC_CLIENT_ID:-}
      - OIDC_CLIENT_SECRET=${OIDC_CLIENT_SECRET:-}
      - OIDC_REDIRECT_URL=${OIDC_REDIRECT_URL:-}

      # Emergency login — set in .env (enabled by default in .env.standalone.example)
      - ENABLE_EMERGENCY_LOGIN=${ENABLE_EMERGENCY_LOGIN:-false}
      - SU_USER=${SU_USER:-}
      - SU_PWD=${SU_PWD:-}

      # RTMP streaming token
      - RTMP_PUBLISH_TOKEN=${RTMP_PUBLISH_TOKEN:-changeme}

      - RUN_MODE=${RUN_MODE:-production}
    depends_on:
      mediamtx:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    networks:
      - platform-network

  # MediaMTX — only needed if RTMP/HLS streaming is used
  # Comment out if customer does not need live streaming
  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: mediamtx
    restart: unless-stopped
    ports:
      - "1935:1935"  # RTMP ingest
      - "8888:8888"  # HLS output
      - "8889:8889"  # WebRTC
      - "9997:9997"  # API
    volumes:
      - ../mediamtx.yml:/mediamtx.yml:ro,z
    environment:
      - MTX_PROTOCOLS=tcp
      - MTX_LOGLEVEL=info
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9997/v3/config/get"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - platform-network

networks:
  platform-network:
    driver: bridge

volumes:
  storage:
    driver: local
