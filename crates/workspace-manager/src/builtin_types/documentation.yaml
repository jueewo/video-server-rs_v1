id: documentation
name: Documentation Hub
icon: book-open
description: A structured documentation site or knowledge base
color: "#607D8B"
git_template: null
metadata_schema:
  - key: title
    label: Documentation Title
    type: string
    default: ""
    required: true
  - key: version
    label: Version
    type: string
    default: ""
    required: false
  - key: audience
    label: Target Audience
    type: enum
    values: [developers, end-users, administrators, mixed]
    default: developers
    required: false
  - key: description
    label: Description
    type: multiline
    default: ""
    required: false
agent_roles:
  - role: content-writer
    description: Creates and edits documentation pages
    default_actions:
      - Write new page
      - Edit page content
      - Generate API reference
  - role: doc-reviewer
    description: Reviews documentation for clarity and completeness
    default_actions:
      - Review for clarity
      - Check for gaps
      - Fix formatting
