{% extends "base-tailwind.html" %} {% block title %}Already Logged In{% endblock
%} {% block content %}
<div
    class="min-h-[calc(100vh-4rem)] flex items-center justify-center bg-base-200 px-4"
>
    <div class="card w-full max-w-md bg-base-100 shadow-2xl">
        <div class="card-body">
            <!-- Header -->
            <div class="text-center mb-6">
                <div
                    class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-success/10 mb-4"
                >
                    <i data-lucide="check-circle" class="w-8 h-8 text-success"></i>
                </div>
                <h1 class="text-3xl font-bold mb-4">Already Logged In</h1>
            </div>

            <!-- Success Alert -->
            <div class="alert alert-success shadow-lg mb-6">
                <i data-lucide="check-circle" class="shrink-0 w-6 h-6"></i>
                <span>You are already authenticated.</span>
            </div>

            <!-- Action Buttons -->
            <div class="space-y-3">
                <a href="/" class="btn btn-primary btn-lg w-full gap-2">
                    <i data-lucide="home" class="w-5 h-5"></i>
                    Back to Home
                </a>
                <a
                    href="/logout"
                    class="btn btn-secondary btn-outline w-full gap-2"
                >
                    <i data-lucide="log-out" class="w-5 h-5"></i>
                    Logout
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
